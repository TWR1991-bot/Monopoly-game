<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>預拌廠大富翁 - 專業流程教學版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 大富翁4 經典風格配色 */
        :root {
            --m4-blue: #2A82E4;
            --m4-light-blue: #E1F0FF;
            --m4-yellow: #FFD700;
            --m4-pink: #FF69B4;
            --m4-green: #32CD32;
            --m4-border: #1E4A8D;
            --m4-shadow: rgba(0,0,0,0.2);
        }

        body {
            background-color: #A3D2F7; /* 經典背景色 */
            background-image: radial-gradient(#C6E4FF 15%, transparent 16%), radial-gradient(#C6E4FF 15%, transparent 16%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            overflow-x: hidden;
        }

        /* 立體外框 */
        .m4-panel {
            background: white;
            border: 4px solid var(--m4-border);
            box-shadow: 6px 6px 0px rgba(0,0,0,0.15);
            border-radius: 12px;
        }

        /* 經典藍色標題 */
        .m4-header {
            background: var(--m4-blue);
            color: white;
            border-bottom: 3px solid var(--m4-border);
            padding: 8px 16px;
            font-weight: 900;
            text-shadow: 2px 2px 0px var(--m4-border);
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            gap: 6px;
            width: 95vw;
            max-width: 920px;
            aspect-ratio: 1 / 1;
            margin: 10px auto;
            background: #6CB6F2;
            padding: 12px;
            border: 5px solid #FFFFFF;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            border-radius: 15px;
        }

        .tile {
            background: #FFFFFF;
            border: 2px solid #D1E9FF;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2px;
            position: relative;
            border-radius: 6px;
            transition: transform 0.1s;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.05);
        }

        .tile:hover {
            transform: scale(1.02);
            z-index: 10;
        }

        .tile-header {
            height: 8px;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 4px 4px 0 0;
            z-index: 5;
        }

        /* 資產格編號文字 (縮小調淡) */
        .tile-no {
            position: absolute;
            top: 6px;
            left: 4px;
            font-size: 6px;
            color: #b0c4de;
            font-weight: 800;
            z-index: 10;
        }

        .tile-level {
            position: absolute;
            top: 4px;
            right: 4px;
            font-size: 8px;
            font-weight: 900;
            padding: 1px 4px;
            border-radius: 3px;
            color: white;
            z-index: 10;
        }

        .m4-btn {
            background: var(--m4-pink);
            color: white;
            border: 3px solid #C41E3A;
            box-shadow: 0 4px 0 #9F1239;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 900;
            transition: all 0.1s;
            text-shadow: 1px 1px 0px rgba(0,0,0,0.3);
        }

        .m4-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #9F1239;
        }

        .m4-btn-blue {
            background: var(--m4-blue);
            border-color: #1E4A8D;
            box-shadow: 0 4px 0 #133363;
        }

        /* 玩家棋子 */
        .player-token {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            position: absolute;
            bottom: 4px;
            border: 2px solid gold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 60;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }

        .active-modal { display: flex; }

        .m4-window {
            background: white;
            border: 6px solid var(--m4-blue);
            border-radius: 20px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            overflow: hidden;
        }

        .durability-bar-container {
            width: 85%;
            height: 6px;
            background: #eee;
            border-radius: 10px;
            margin-top: 3px;
            border: 1px solid #ddd;
        }

        /* 修改：中央區域樣式優化 */
        .board-center {
            grid-area: 2 / 2 / 10 / 10;
            background: #F0F9FF;
            border: 4px solid #A3D2F7;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 10px;
            position: relative;
            padding: 30px;
            background-image: radial-gradient(var(--m4-blue) 1px, transparent 1px);
            background-size: 25px 25px;
            box-shadow: inset 0 0 15px rgba(42, 130, 228, 0.1);
        }

        .rules-container {
            text-align: left;
            z-index: 10;
            max-width: 90%;
            background: rgba(255, 255, 255, 0.7);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid rgba(42, 130, 228, 0.2);
        }

        .rules-title {
            font-size: 22px;
            font-weight: 900;
            color: #1E4A8D;
            border-bottom: 4px solid var(--m4-yellow);
            display: inline-block;
            margin-bottom: 12px;
            letter-spacing: 3px;
            text-shadow: 1px 1px 0 white;
        }

        .rule-item {
            font-size: 14px;
            color: #334155;
            margin-bottom: 8px;
            line-height: 1.6;
            font-weight: 700;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .rule-item::before { 
            content: "◆"; 
            color: var(--m4-blue); 
            font-size: 12px; 
            margin-top: 2px;
        }

        .loop-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-size: 150px;
            font-weight: 900;
            color: rgba(42, 130, 228, 0.05);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body class="p-2 md:p-4 text-slate-800">

<!-- 遊戲初始設定畫面 -->
<div id="setup-screen">
    <div class="m4-window text-center mx-4">
        <div class="m4-header text-xl">預拌廠大富翁 ‧ 夢想啟航</div>
        <div class="p-8">
            <h1 class="text-3xl font-black text-blue-600 mb-2 italic">RICHMAN <span class="text-pink-500">6</span> HEROES</h1>
            <p class="text-slate-500 font-bold mb-8 text-sm">請選擇一同參與營運的人物人數</p>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="startGame(1)" class="m4-btn m4-btn-blue">1 人實習</button>
                <button onclick="startGame(2)" class="m4-btn">2 人競爭</button>
                <button onclick="startGame(3)" class="m4-btn">3 人比拼</button>
                <button onclick="startGame(4)" class="m4-btn">4 人聯賽</button>
                <button onclick="startGame(5)" class="m4-btn">5 人團體</button>
                <button onclick="startGame(6)" class="m4-btn m4-btn-blue">6 人滿員</button>
            </div>
        </div>
    </div>
</div>

<div class="max-w-7xl mx-auto">
    <header class="flex flex-col lg:flex-row justify-between items-center mb-6 px-4">
        <div class="text-center lg:text-left">
            <div class="bg-white px-6 py-2 rounded-full border-4 border-blue-500 shadow-md inline-block">
                <h1 class="text-2xl font-black text-blue-600 tracking-tighter italic uppercase">預拌廠大富翁</h1>
            </div>
        </div>
        
        <div class="flex items-center gap-4 mt-4 lg:mt-0">
            <div class="bg-white px-6 py-2 rounded-xl border-t-4 border-blue-400 shadow text-center">
                <p class="text-[10px] text-blue-400 font-black">當前存款</p>
                <div id="player-balance" class="text-2xl font-black text-slate-700">$ --</div>
            </div>
            <div id="turn-indicator" class="px-8 py-3 rounded-full font-black text-sm shadow-md text-white border-b-4 border-black/20 uppercase tracking-widest">準備中...</div>
        </div>
    </header>

    <div class="grid grid-cols-1 xl:grid-cols-4 gap-6">
        <div class="xl:col-span-1 space-y-4">
            <div class="m4-panel overflow-hidden">
                <div class="m4-header text-sm">技術員清單</div>
                <div id="players-list" class="p-3 space-y-2 max-h-[300px] overflow-y-auto bg-blue-50"></div>
            </div>
            <div class="m4-panel overflow-hidden">
                <div class="m4-header text-sm">營運日誌</div>
                <div id="game-logs" class="log-box bg-slate-900 border-none rounded-none h-[250px] overflow-y-auto p-3 text-[11px] font-mono text-slate-300"></div>
            </div>
        </div>

        <div class="xl:col-span-3">
            <div id="game-board"></div>
            <div class="mt-6 flex gap-4">
                <button id="roll-btn" class="flex-1 m4-btn text-2xl py-6 hover:brightness-110">
                    🎲 啟動生產循環
                </button>
                <button onclick="handleSellCurrent()" class="m4-btn m4-btn-blue px-10 text-sm">
                    處分資產
                </button>
            </div>
        </div>
    </div>
</div>

<div id="property-modal" class="modal">
    <div class="m4-window">
        <div id="prop-m4-header" class="m4-header flex justify-between items-center">
            <span id="prop-name">設備資訊</span>
            <span id="prop-level-tag" class="bg-white/20 px-3 py-1 rounded-full text-xs">Lv.1</span>
        </div>
        <div class="p-8">
            <div id="prop-color-bar" class="h-2 w-full mb-4 rounded-full"></div>
            <div class="flex items-center gap-4 mb-6">
                <div class="flex-1 p-4 bg-yellow-50 border-2 border-yellow-200 rounded-xl">
                    <p class="text-[10px] text-yellow-600 font-black uppercase">公司報價</p>
                    <p id="prop-price" class="text-2xl font-black text-yellow-700">$0</p>
                </div>
                <div class="flex-1 p-4 bg-green-50 border-2 border-green-200 rounded-xl">
                    <p class="text-[10px] text-green-600 font-black uppercase">堅固值</p>
                    <div class="flex items-center gap-2">
                        <div class="flex-1 h-3 bg-white rounded-full overflow-hidden border">
                            <div id="prop-durability-bar" class="h-full bg-green-500 transition-all"></div>
                        </div>
                        <span id="prop-durability-text" class="text-xs font-black">100</span>
                    </div>
                </div>
            </div>

            <div id="prop-desc" class="bg-blue-50 p-6 rounded-xl text-sm text-blue-800 leading-relaxed border-2 border-blue-100 mb-6 italic whitespace-pre-wrap"></div>
            
            <div id="upgrade-section" class="mb-6 hidden">
                <p class="font-black text-blue-600 text-xs mb-3 flex items-center gap-2">
                    ✨ 配件強化中心
                </p>
                <div id="upgrade-list" class="space-y-2"></div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8" id="prop-fees-container">
                <div class="p-4 m4-panel bg-rose-50 border-rose-200">
                    <p class="text-[10px] text-rose-400 font-black">故障維修支出</p>
                    <p id="prop-fee-repair" class="text-xl font-black text-rose-600">-$0</p>
                </div>
                <div class="p-4 m4-panel bg-orange-50 border-orange-200">
                    <p class="text-[10px] text-orange-400 font-black">定期保養支出</p>
                    <p id="prop-fee-maint" class="text-xl font-black text-orange-600">-$0</p>
                </div>
            </div>
            <div class="flex flex-col gap-3" id="prop-actions"></div>
        </div>
    </div>
</div>

<div id="msg-modal" class="modal">
    <div class="m4-window">
        <div class="m4-header">廠務通知</div>
        <div class="p-8 text-center">
            <div id="msg-icon" class="text-6xl mb-4">📢</div>
            <h3 id="msg-title" class="text-xl font-black text-blue-800 mb-2">通知標題</h3>
            <p id="msg-body" class="text-slate-500 mb-6 text-lg leading-relaxed"></p>
            <div id="msg-custom-content" class="mb-6 hidden"></div>
            <button id="msg-close-btn" onclick="closeModal('msg-modal')" class="m4-btn w-full">確認收悉</button>
        </div>
    </div>
</div>

    // --- 核心邏輯 ---

    function startGame(count) {
        const shuffledHeroes = [...CHARACTER_POOL].sort(() => Math.random() - 0.5);
        players = [];
        for (let i = 0; i < count; i++) {
            const hero = shuffledHeroes[i % shuffledHeroes.length];
            players.push({
                id: i, name: hero.name, pos: 0, balance: 15000, color: hero.color,
                avatar: hero.icon, owned_data: {}, skipTurns: 0, skipImmunity: 0, 
                feeImmunity: false, loanDebt: 0, loanInstallments: 0
            });
        }
        currentTurnPlayerIdx = 0;
        document.getElementById('setup-screen').style.display = 'none';
        initGame();
    }

    function initGame() {
        renderBoard();
        updatePlayersUI();
        updateTurnUI();
    }

    function renderBoard() {
        const board = document.getElementById('game-board');
        board.innerHTML = '';
        const side = 10;
        const coords = [];
        for (let x = 0; x < side; x++) coords.push({r: 1, c: x + 1});
        for (let y = 1; y < side - 1; y++) coords.push({r: y + 1, c: side});
        for (let x = side - 1; x >= 0; x--) coords.push({r: side, c: x + 1});
        for (let y = side - 2; y >= 1; y--) coords.push({r: y + 1, c: 1});

        INITIAL_TILES.forEach((data, idx) => {
            const div = document.createElement('div');
            const isGreen = data.specialType === 'start';
            const isPale = data.color === '#fef9c3';
            const isYellow = data.specialType === 'chance_or_fate';
            
            div.className = `tile ${isGreen ? 'tile-green' : (isPale ? 'tile-light-yellow' : (isYellow ? 'tile-yellow' : ''))}`;
            if (data.type === 'special' && !isPale && !isGreen && !isYellow) div.className += ' tile-special';
            
            div.dataset.idx = idx;
            div.style.gridRow = coords[idx].r;
            div.style.gridColumn = coords[idx].c;
            
            if (data.type === 'prop' && data.color) {
                const header = document.createElement('div');
                header.className = 'tile-header';
                header.style.backgroundColor = data.color;
                div.prepend(header);
            }

            const noDiv = document.createElement('div');
            noDiv.className = 'tile-no';
            noDiv.innerText = `#${idx + 1}`;
            div.appendChild(noDiv);

            let owner = players.find(p => p.owned_data[idx]);
            if (owner) {
                const lvDiv = document.createElement('div');
                lvDiv.className = 'tile-level';
                lvDiv.innerText = `Lv.${owner.owned_data[idx].level}`;
                lvDiv.style.backgroundColor = owner.color;
                div.appendChild(lvDiv);
            }
            
            const nameDiv = document.createElement('div');
            nameDiv.className = 'font-black px-1 mt-2 leading-tight break-words text-slate-800';
            nameDiv.style.fontSize = '12px';
            nameDiv.innerHTML = data.name.length > 5 ? data.name.substring(0, 4) + '<br>' + data.name.substring(4) : data.name;
            div.appendChild(nameDiv);

            if (isGreen) {
                const label = document.createElement('div');
                label.className = 'start-label';
                label.innerText = '起點';
                div.appendChild(label);
            }
            
            if (data.icon) {
                const iconDiv = document.createElement('div');
                iconDiv.className = 'text-xl mt-1 opacity-60';
                iconDiv.innerText = data.icon;
                div.appendChild(iconDiv);
            } else if (data.price) {
                const priceDiv = document.createElement('div');
                priceDiv.className = 'text-blue-500 font-bold mt-1 tracking-tight';
                priceDiv.style.fontSize = '8px';
                priceDiv.innerText = `$${data.price}`;
                div.appendChild(priceDiv);

                if (owner) {
                    const dur = owner.owned_data[idx].durability;
                    const barContainer = document.createElement('div');
                    barContainer.className = 'durability-bar-container';
                    const bar = document.createElement('div');
                    bar.className = 'durability-bar';
                    bar.style.width = dur + '%';
                    bar.style.backgroundColor = dur <= 0 ? '#f43f5e' : (dur < 50 ? '#f59e0b' : '#10b981');
                    barContainer.appendChild(bar);
                    div.appendChild(barContainer);
                }
            }
            board.appendChild(div);
        });

        const center = document.createElement('div');
        center.className = 'board-center';
        center.innerHTML = `
            <div class="loop-watermark">LOOP</div>
            <div class="rules-container">
                <h4 class="rules-title">廠區營運手冊</h4>
                <p class="rule-item">融資服務：依資產上限申貸總資產 80%，每過起點分 5 期自動還款。</p>
                <p class="rule-item">等級標示：收購後出現邊框。Lv1 為上右；Lv2 為上右下；Lv3 為四周封閉。</p>
                <p class="rule-item">堅固系統：設備 Lv3 每停留扣 2 點。低於 50% 維修費減半，歸零停收費。</p>
                <p class="rule-item">336 健檢：房主停留自家資產滿 3/6/12 次，該設備堅固值回升 5 點。</p>
                <p class="rule-item">專業格位：運動場、休息室、洗手間、醫護室觸發隨機獎懲事件。</p>
            </div>
        `;
        board.appendChild(center);
    }

    function updatePlayersUI() {
        const listDiv = document.getElementById('players-list');
        listDiv.innerHTML = '';
        document.querySelectorAll('.player-token').forEach(el => el.remove());
        document.querySelectorAll('.tile').forEach(tile => tile.style.boxShadow = '');

        players.forEach((p, idx) => {
            const div = document.createElement('div');
            const isCurrent = idx === currentTurnPlayerIdx;
            div.className = `p-3 rounded-lg flex flex-col gap-1 text-[10px] shadow border-2 ${isCurrent ? 'bg-white border-blue-400 font-black' : 'bg-slate-50 border-transparent opacity-80'}`;
            div.innerHTML = `
                <div class="flex justify-between items-center">
                    <span><span style="color:${p.color}">●</span> ${p.avatar} ${p.name}</span>
                    <span>$${p.balance}</span>
                </div>
                ${p.loanDebt > 0 ? `<div class="text-[9px] text-rose-500 font-bold">還款中: $${Math.round(p.loanDebt)} (${p.loanInstallments}/5)</div>` : ''}
            `;
            listDiv.appendChild(div);

            if (isCurrent) document.getElementById('player-balance').innerText = `$${p.balance}`;

            const tile = document.querySelector(`[data-idx="${p.pos}"]`);
            if (tile) {
                const token = document.createElement('div');
                token.className = 'player-token';
                token.style.backgroundColor = p.color;
                token.innerText = p.avatar;
                const offsetX = (idx % 3) * 6 - 6;
                const offsetY = Math.floor(idx / 3) * 6 - 6;
                token.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
                tile.appendChild(token);
            }

            Object.keys(p.owned_data).forEach(tileIdx => {
                const el = document.querySelector(`[data-idx="${tileIdx}"]`);
                if (el) {
                    const lv = p.owned_data[tileIdx].level;
                    const tileColor = INITIAL_TILES[tileIdx].color || p.color;
                    if (lv === 1) el.style.boxShadow = `inset 0 6px 0 0 ${tileColor}, inset -6px 0 0 0 ${tileColor}`;
                    else if (lv === 2) el.style.boxShadow = `inset 0 6px 0 0 ${tileColor}, inset -6px 0 0 0 ${tileColor}, inset 0 -6px 0 0 ${tileColor}`;
                    else el.style.boxShadow = `inset 0 0 0 6px ${tileColor}`;
                }
            });
        });
    }

    function updateTurnUI() {
        const p = players[currentTurnPlayerIdx];
        if (!p) return;
        const ind = document.getElementById('turn-indicator');
        ind.innerText = rollAgain ? `${p.avatar} ${p.name} 氣勢加成！` : `輪到 ${p.name}`;
        ind.style.backgroundColor = p.color;
    }

    document.getElementById('roll-btn').onclick = () => {
        const p = players[currentTurnPlayerIdx];
        if (!rollAgain) p.feeImmunity = false; 

        if (p.skipTurns > 0) {
            p.skipTurns--;
            addLog(`⏳ ${p.avatar} ${p.name} 回復體力中...`);
            showMsg("作業停留", `${p.name} 需停留作業。`, "⏳");
            nextTurn();
            return;
        }

        const dice = Math.floor(Math.random() * 6) + 1;
        addLog(`${p.avatar} ${p.name} 擲出了 ${dice} 點`);
        
        let oldPos = p.pos;
        let newPos = (p.pos + dice) % 36;
        
        if (newPos < oldPos) {
            p.balance += 2500;
            if (p.loanDebt > 0) {
                let repayment = Math.round(p.loanDebt / p.loanInstallments);
                p.balance -= repayment;
                p.loanDebt -= repayment;
                p.loanInstallments--;
                if (p.loanInstallments <= 0) p.loanDebt = 0;
                addLog(`🏦 銀行自動扣款：$${repayment}`);
            }
        }
        
        p.pos = newPos;
        rollAgain = false; 
        updatePlayersUI();
        handleTile(newPos);
    };

    function isMaxLevel(tileIdx, currentLevel) {
        const t = INITIAL_TILES[tileIdx];
        if (!t.upgrades) return true;
        const steps = t.upgrades.filter(u => u.type === 'step').length;
        const choice = t.upgrades.some(u => u.type === 'choice') ? 1 : 0;
        return currentLevel >= (1 + steps + choice);
    }

    function handleTile(pos, fromEvent = false) {
        const t = INITIAL_TILES[pos];
        const p = players[currentTurnPlayerIdx];
        let owner = players.find(player => player.owned_data[pos]);

        if (owner && !fromEvent) {
             const d = owner.owned_data[pos];
             if (isMaxLevel(pos, d.level)) d.durability = Math.max(0, d.durability - 2);
        }

        if (owner && owner.id === p.id && !fromEvent) {
            owner.owned_data[pos].visitCount++;
            if ([3, 6, 12].includes(owner.owned_data[pos].visitCount)) {
                owner.owned_data[pos].durability = Math.min(100, owner.owned_data[pos].durability + 5);
                showMsg("336 健檢", `獲得免費健檢，堅固值回升 5`, "🔧");
                if (owner.owned_data[pos].visitCount === 12) owner.owned_data[pos].visitCount = 0;
            }
        }
        
        if (t.type === 'prop') {
            if (!owner) showPropModal(pos, true);
            else if (owner.id === p.id) showPropModal(pos, false, true);
            else triggerMaintenance(pos, owner);
        } else if (t.specialType === 'chance_or_fate') {
            triggerChanceOrFateEvent();
        } else if (t.specialType === 'bank') {
            triggerBank(p);
        } else if (t.specialType === 'rest') {
            if (!fromEvent) {
                triggerRandomSpecial(pos, [
                    { t: "交流經驗，往前 1 格", f: (p)=>{ p.pos = (p.pos+1)%36; updatePlayersUI(); setTimeout(()=>handleTile(p.pos, true), 800); }, i: "🏃", ra: false },
                    { t: "午休睡過頭，扣 200 元", f: (p)=>{ p.balance -= 200; }, i: "😴", ra: false },
                    { t: "補充體力，免除下次停留", f: (p)=>{ p.skipImmunity++; }, i: "🔋", ra: false }
                ]);
            } else nextTurn();
        } else if (t.specialType === 'sports') {
            triggerRandomSpecial(pos, [
                { t: "精神飽滿，再擲一次", f: ()=>{}, i: "🎾", ra: true },
                { t: "體力下降，停留 一回合", f: (p)=>{ if(p.skipImmunity > 0){ p.skipImmunity--; return "抵消停留！"; } p.skipTurns = 1; }, i: "😫", ra: false },
                { t: "效率提升，獎金 +200 元", f: (p)=>{ p.balance += 200; }, i: "⚡", ra: false }
            ]);
        } else if (t.specialType === 'restroom') {
            triggerRandomSpecial(pos, [
                { t: "發現積水回報，獎金 +200 元", f: (p)=>{ p.balance += 200; }, i: "🧼", ra: false },
                { t: "上班偷懶被抓，扣 100 元", f: (p)=>{ p.balance -= 100; }, i: "📱", ra: false },
                { t: "心情大好，再擲一次", f: ()=>{}, i: "✨", ra: true }
            ]);
        } else if (t.specialType === 'infirmary') {
            triggerRandomSpecial(pos, [
                { t: "輕微拉傷，停留 一回合", f: (p)=>{ if(p.skipImmunity > 0){ p.skipImmunity--; return "已包紮！"; } p.skipTurns = 1; }, i: "🩹", ra: false },
                { t: "提早回報，獎金 +300 元", f: (p)=>{ p.balance += 300; }, i: "📢", ra: false },
                { t: "健康檢查正常，再擲一次", f: ()=>{}, i: "✅", ra: true }
            ]);
        } else nextTurn();
        renderBoard();
    }

    function triggerBank(p) {
        const propValue = Object.keys(p.owned_data).reduce((acc, idx) => acc + INITIAL_TILES[idx].price, 0);
        const totalAssets = p.balance + propValue;
        const maxLoan = Math.round(totalAssets * 0.8);

        document.getElementById('msg-title').innerText = "融資服務";
        document.getElementById('msg-icon').innerText = "🏦";
        document.getElementById('msg-body').innerText = `總資產 $${totalAssets}\n最高額度：$${maxLoan}\n(分5期，每過起點自動扣款)`;
        
        const customContent = document.getElementById('msg-custom-content');
        customContent.innerHTML = '';
        customContent.classList.remove('hidden');

        if (p.loanDebt > 0) {
            customContent.innerHTML = `<div class="p-4 text-rose-500 font-bold">尚有債務未清償！</div>`;
        } else {
            [2000, 5000, maxLoan].forEach(amt => {
                const btn = document.createElement('button');
                btn.className = "m4-btn m4-btn-blue w-full mb-2";
                btn.innerText = `融資 $${amt}`;
                btn.onclick = () => {
                    p.balance += amt; p.loanDebt = amt; p.loanInstallments = 5;
                    addLog(`🏦 ${p.name} 融資 $${amt}`);
                    closeModal('msg-modal'); updatePlayersUI(); nextTurn();
                };
                customContent.appendChild(btn);
            });
        }
        document.getElementById('msg-modal').classList.add('active-modal');
    }

    function triggerRandomSpecial(pos, events) {
        const p = players[currentTurnPlayerIdx];
        const ev = events[Math.floor(Math.random() * events.length)];
        const extra = ev.f(p);
        rollAgain = ev.ra;
        showMsg(INITIAL_TILES[pos].name, (extra ? extra + "\n" : "") + ev.t, ev.i);
        addLog(`📍 ${p.name}：${ev.t}`);
        updatePlayersUI();
        if (!rollAgain && !ev.t.includes('往前')) nextTurn();
        else updateTurnUI();
    }

    function triggerChanceOrFateEvent() {
        const p = players[currentTurnPlayerIdx];
        const oldPos = p.pos;
        const ev = CHANCE_EVENTS[Math.floor(Math.random() * CHANCE_EVENTS.length)];
        const extra = ev.effect(p);
        showMsg("機會或命運", (extra ? extra + "\n" : "") + ev.text, ev.icon);
        addLog(`💡 ${p.name}：${ev.text}`);
        updatePlayersUI();
        if (p.pos !== oldPos) setTimeout(() => handleTile(p.pos, true), 800);
        else nextTurn();
    }

    function triggerMaintenance(pos, owner) {
        const p = players[currentTurnPlayerIdx];
        if (p.feeImmunity) { showMsg("主管臨檢", "免付費！", "🛡️"); nextTurn(); return; }
        const t = INITIAL_TILES[pos];
        const d = owner.owned_data[pos];
        let m = 1 + (d.level - 1) * 0.5;
        if (d.durability <= 0) m = 0; else if (d.durability < 50) m *= 0.5;
        const r = Math.random();
        let fee = 0; let type = "正常生產";
        if (m > 0) {
            if (r < 0.3) { fee = Math.round(t.fees.repair * m); type = "💥 緊急維修"; }
            else if (r < 0.7) { fee = Math.round(t.fees.maint * m); type = "🔧 定期保養"; }
        }
        if (fee > 0) {
            p.balance -= fee; owner.balance += fee;
            showMsg(type, `${p.name} 向 ${owner.name} 支付 $${fee}`, "💸");
            addLog(`💸 ${p.name} 向 ${owner.name} 支付 $${fee}`);
        }
        updatePlayersUI();
        nextTurn();
    }

    function showPropModal(pos, canBuy = false, canUpgrade = false) {
        const t = INITIAL_TILES[pos];
        const p = players[currentTurnPlayerIdx];
        let ownerOfThis = players.find(player => player.owned_data[pos]);
        const d = (ownerOfThis ? ownerOfThis.owned_data[pos] : null) || { level: 1, upgrades: [], durability: 100 };
        
        document.getElementById('prop-name').innerText = t.name;
        document.getElementById('prop-price').innerText = `$${t.price || 0}`;
        document.getElementById('prop-desc').innerText = t.desc;
        document.getElementById('prop-level-tag').innerText = `Lv.${d.level}`;
        document.getElementById('prop-color-bar').style.backgroundColor = t.color || '#3b82f6';
        
        const durBar = document.getElementById('prop-durability-bar');
        durBar.style.width = d.durability + '%';
        document.getElementById('prop-durability-text').innerText = d.durability;

        let m = 1 + (d.level - 1) * 0.5;
        if (d.durability <= 0) m = 0; else if (d.durability < 50) m *= 0.5;
        document.getElementById('prop-fee-repair').innerText = `-$${Math.round(t.fees.repair * m)}`;
        document.getElementById('prop-fee-maint').innerText = `-$${Math.round(t.fees.maint * m)}`;
        
        const actions = document.getElementById('prop-actions');
        actions.innerHTML = '';
        const upSection = document.getElementById('upgrade-section');
        const upList = document.getElementById('upgrade-list');
        upSection.classList.add('hidden');
        
        if (canBuy && p.balance >= t.price) {
            const b = document.createElement('button');
            b.className = "m4-btn w-full";
            b.innerText = `投資收購 ($${t.price})`;
            b.onclick = () => buyProp(pos);
            actions.appendChild(b);
        }
        
        if (canUpgrade && t.upgrades) {
            upSection.classList.remove('hidden');
            upList.innerHTML = '';
            t.upgrades.forEach(u => {
                const has = d.upgrades.includes(u.name);
                const stepLock = u.type === 'step' && d.level < u.levelReq;
                const btn = document.createElement('button');
                btn.className = `p-3 rounded-lg border-2 flex flex-col items-start transition-all ${has ? 'bg-green-50 border-green-400' : (stepLock ? 'opacity-30 grayscale' : 'bg-white border-blue-200 hover:border-blue-400')}`;
                btn.disabled = has || stepLock;
                btn.innerHTML = `<div class="flex justify-between w-full font-black text-[12px]"><span>${u.name}</span><span class="text-blue-600">${has ? 'OK' : '$' + u.price}</span></div>`;
                btn.onclick = () => upgradeProp(pos, u);
                upList.appendChild(btn);
            });
            if (ownerOfThis && d.durability < 100) {
                const refurbBtn = document.createElement('button');
                refurbBtn.className = "m4-btn m4-btn-blue w-full mt-2";
                refurbBtn.innerText = `🛠️ 重新裝修 (恢復標示)`;
                refurbBtn.onclick = () => refurbishProp(pos);
                actions.appendChild(refurbBtn);
            }
        }
        
        const closeBtn = document.createElement('button');
        closeBtn.className = "m4-btn m4-btn-blue w-full opacity-60";
        closeBtn.innerText = "完成作業";
        closeBtn.onclick = () => { closeModal('property-modal'); nextTurn(); };
        actions.appendChild(closeBtn);
        document.getElementById('property-modal').classList.add('active-modal');
    }

    function buyProp(pos) {
        const p = players[currentTurnPlayerIdx];
        const t = INITIAL_TILES[pos];
        p.balance -= t.price;
        p.owned_data[pos] = { level: 1, upgrades: [], durability: 100, visitCount: 0 };
        addLog(`🏗️ ${p.avatar} ${p.name} 收購了 ${t.name}`);
        closeModal('property-modal'); updatePlayersUI(); nextTurn();
    }

    function upgradeProp(pos, upgrade) {
        const p = players[currentTurnPlayerIdx];
        if (p.balance >= upgrade.price) {
            p.balance -= upgrade.price;
            p.owned_data[pos].upgrades.push(upgrade.name);
            p.owned_data[pos].level += 1;
            addLog(`🛠️ ${p.avatar} ${p.name} 升級 ${INITIAL_TILES[pos].name}`);
            closeModal('property-modal'); updatePlayersUI(); nextTurn();
        }
    }

    function refurbishProp(pos) {
        const p = players[currentTurnPlayerIdx];
        p.owned_data[pos].level = 1;
        p.owned_data[pos].upgrades = [];
        p.owned_data[pos].durability = 100;
        p.owned_data[pos].visitCount = 0;
        addLog(`♻️ ${p.avatar} ${p.name} 重新修繕 ${INITIAL_TILES[pos].name}`);
        closeModal('property-modal'); updatePlayersUI(); renderBoard(); nextTurn();
    }

    function handleSellCurrent() {
        const p = players[currentTurnPlayerIdx];
        if (p.owned_data[p.pos]) {
            const t = INITIAL_TILES[p.pos];
            p.balance += Math.round(t.price * 0.7);
            delete p.owned_data[p.pos];
            addLog(`💰 ${p.name} 處分資產`);
            renderBoard(); updatePlayersUI();
        }
    }

    function nextTurn() {
        if (rollAgain) return;
        currentTurnPlayerIdx = (currentTurnPlayerIdx + 1) % players.length;
        updateTurnUI();
        updatePlayersUI();
    }

    function addLog(m) {
        const b = document.getElementById('game-logs');
        const d = document.createElement('div');
        d.className = "mb-2 border-l-4 border-blue-500 pl-3 py-1 bg-slate-800 rounded-r-lg";
        d.innerHTML = m;
        b.prepend(d);
    }

    function showMsg(t, b, i = '📢') {
        document.getElementById('msg-title').innerText = t;
        document.getElementById('msg-body').innerText = b;
        document.getElementById('msg-icon').innerText = i;
        document.getElementById('msg-modal').classList.add('active-modal');
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('active-modal');
        document.getElementById('msg-custom-content').classList.add('hidden');
        if (rollAgain) updateTurnUI(); 
    }
</script>
</body>
</html>
